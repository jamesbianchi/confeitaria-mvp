<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pedidos — Confeitaria</title>
  <link rel="stylesheet" href="../css/global.css" />
  <link rel="stylesheet" href="../css/components.css" />
  <style>
    .itens-lista { margin: 8px 0 16px; display: flex; flex-direction: column; gap: 8px; }
    .item-row { display: flex; gap: 8px; align-items: center; background: #fafaf8;
      border: 0.5px solid #e0dfd8; border-radius: 6px; padding: 8px 12px; }
    .item-row select { flex: 2; }
    .item-row input  { flex: 1; }
    .item-row button { flex-shrink: 0; }
    .item-total { font-size: 12px; color: #888; min-width: 70px; text-align: right; }
    .valor-total-box { background: #f0fdf4; border: 0.5px solid #bbf7d0;
      border-radius: 6px; padding: 10px 14px; font-size: 14px;
      font-weight: 500; color: #166534; text-align: right; margin-bottom: 12px; }
  </style>
</head>
<body>

  <div class="layout">
    <aside class="sidebar">
      <div class="logo">
        <img src="../portal/imgs/logotipo.png" alt="Confeitaria" class="sidebar-logo-img" />
      </div>
      <nav>
        <a href="../index.html">🏠 Início</a>
        <a href="pedidos.html" class="active">📋 Pedidos</a>
        <a href="agenda.html">📅 Agenda</a>
        <a href="clientes.html">👤 Clientes</a>
        <a href="cardapio.html">🍫 Cardápio</a>
        <a href="financeiro.html">💰 Financeiro</a>
      </nav>
    </aside>

    <main class="main-content">
      <div class="page-header">
        <h1 class="page-title">Pedidos</h1>
        <button class="btn btn-primary" onclick="abrirModal()">+ Novo pedido</button>
      </div>

      <!-- Filtros -->
      <div class="filters">
        <input type="text" id="busca" placeholder="Buscar cliente..." oninput="filtrar()" />
        <select id="filtro-status" onchange="filtrar()">
          <option value="todos">Todos os status</option>
          <option value="recebido">Recebido</option>
          <option value="confirmado">Confirmado</option>
          <option value="em_producao">Em produção</option>
          <option value="pronto">Pronto</option>
          <option value="entregue">Entregue</option>
          <option value="cancelado">Cancelado</option>
        </select>
        <input type="date" id="filtro-data" onchange="filtrar()" />
      </div>

      <!-- Tabela -->
      <div class="card">
        <table>
          <thead>
            <tr>
              <th>Cliente</th>
              <th>Entrega</th>
              <th>Tipo</th>
              <th>Valor</th>
              <th>Status</th>
              <th>Pagamento</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="lista-pedidos">
            <tr><td colspan="7" class="empty-state">Carregando...</td></tr>
          </tbody>
        </table>
      </div>
    </main>
  </div>

  <!-- ===== MODAL PEDIDO ===== -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal" style="max-width:600px">
      <div class="modal-header">
        <span class="modal-title" id="modal-titulo">Novo pedido</span>
        <button class="modal-close" onclick="fecharModal()">×</button>
      </div>

      <input type="hidden" id="pedido-id" />

      <div class="form-group">
        <label>Cliente *</label>
        <select id="pedido-cliente"></select>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div class="form-group">
          <label>Data de entrega *</label>
          <input type="date" id="pedido-data" onchange="verificarCapacidade()" />
        </div>
        <div class="form-group">
          <label>Tipo de entrega *</label>
          <select id="pedido-tipo">
            <option value="delivery">Delivery</option>
            <option value="retirada">Retirada</option>
          </select>
        </div>
      </div>

      <!-- Alerta de capacidade -->
      <div id="alerta-capacidade" style="display:none;background:#fff8e1;border:0.5px solid
        #fcd34d;border-radius:6px;padding:8px 12px;font-size:12px;color:#92400e;margin-bottom:12px">
      </div>

      <!-- Itens do pedido -->
      <div class="form-group">
        <label>Itens do pedido *</label>
        <div id="itens-lista" class="itens-lista"></div>
        <button class="btn btn-outline" style="width:100%" onclick="adicionarItem()">
          + Adicionar item
        </button>
      </div>

      <!-- Total -->
      <div class="valor-total-box" id="valor-total-box">Total: R$ 0,00</div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div class="form-group">
          <label>Status</label>
          <select id="pedido-status">
            <option value="recebido">Recebido</option>
            <option value="confirmado">Confirmado</option>
            <option value="em_producao">Em produção</option>
            <option value="pronto">Pronto</option>
            <option value="entregue">Entregue</option>
            <option value="cancelado">Cancelado</option>
          </select>
        </div>
        <div class="form-group">
          <label>Sinal recebido (R$)</label>
          <input type="number" id="pedido-sinal" min="0" step="0.01"
            placeholder="0,00" oninput="atualizarStatusPagamento()" />
        </div>
      </div>

      <div class="form-group">
        <label>Observações</label>
        <textarea id="pedido-obs" rows="2"
          placeholder="Ex: tema rosa, sem lactose, entregar às 14h"></textarea>
      </div>

      <div class="modal-footer">
        <button class="btn btn-outline" onclick="fecharModal()">Cancelar</button>
        <button class="btn btn-primary" onclick="salvarPedido()">Salvar pedido</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>
  <script type="module" src="../js/pedidos.js"></script>
  <!-- Biblioteca de geração de PDF -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</body>
</html>
